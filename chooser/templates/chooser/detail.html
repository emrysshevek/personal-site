{% extends "home/base.html" %}
{% block title %}Chooser{% endblock %}
{% block content %}

  <h1>{{ collection.name }}</h1>

  {% if collection.item_set.all %}
    
    <form action="{% url 'chooser:detail' collection.id %}" method="post">
      {% csrf_token %}
      {{ form }}
      <input type="submit" value="Run">
    </form>
  {% else %}
    <p>No items yet</p>
  {% endif %}

{% endblock %}
