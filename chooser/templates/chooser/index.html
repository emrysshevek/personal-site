{% extends "home/base.html" %}
{% block title %}Chooser{% endblock %}
{% block content %}
  {% if collection_list %}
    <ul>
      {% for collection in collection_list %}
        <li><a href="{% url 'chooser:detail' collection.id %}" >{{ collection.name }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No collections are available.</p>
  {% endif %}
{% endblock %}
