<!doctype html>
<html lang="en-US">
  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Chooser</title>

    {% load static %}
    {% comment %} <link rel="stylesheet" href="{% static 'polls/style.css' %}"> {% endcomment %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  
  </head>
  <body>
    <h1>{{ tournament.get_current_player.name }}'s turn</h1>
    <form action="{% url 'chooser:choose' tournament.id %}" method="post">
      {% csrf_token %}
      <fieldset>
        <legend><h1>{{ tournament.collection.name }}</h1></legend>
        {% if error_message %}<p><strong>{{ error_message }}</strong></p>{% endif%}
        {% for item in tournament.get_options %}
          <input type="radio", name="item" id="item{{ forloop.counter }}" value="{{item.id}}">
          <label for="item{{ forloop.counter }}">{{ item.value }}</label><br>
        {% endfor %}
      </fieldset>
      <input type="submit" value="Veto">
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
