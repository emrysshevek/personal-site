{% load static %}
<script type="text/javascript" src="{% static 'home/navbar.js' %}"></script>


<div class="container">
  <nav class="navbar">

    {# Main Header Title #}
    <div class="container-fluid justify-content-center">
      {# Home link. Can change to include image #}
      <a class="navbar-brand fs-1 fade-in" href="/" id="nav-title">{{ title }}</a>
    </div>

    {# Links #}
    <div class="container-fluid justify-content-center">
      <nav class="nav">
        {% for name, url in navs.items %}
          <a class="nav-link fade-in" role="button" href={{ url }} active="true">{{ name}}</a>
        {% endfor %}
        
        <div class="nav-item dropdown" >
          <a class="nav-link dropdown-toggle fade-in" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Projects</a>
          <ul class="dropdown-menu">
            <li><a role="button" href="{% url 'photo:index' %}">Photography</a></li>
            <li><a role="button" target="_blank" href="https://eshevek.itch.io/">Game Dev</a></li>
            <li><a role="button" target="_blank" href="https://eshevek.itch.io/">Code</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a role="button" href="{% url 'chooser:index' %}">Chooser</a></li>
          </ul>
        <div>

      </nav>
    </div>

  </nav>

</div>
