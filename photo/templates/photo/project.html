{% extends 'photo/base.html' %}
{% block title %}From Darkness{% endblock %}


{% block content %}
<div class="container-fluid">
    <div class="row text-center"><div class="col"><h1 class="display-3">{{ project.title }}</h1></div></div>
    <div class="row text-justify justify-content-center"><div class="col-8"><p>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;{{ project.statement }}</p></div></div>
    <div class="row" data-masonry='{"percentPosition": true }'>
        {% for photo in project.photo_set.all %}
            <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
                <div class="card">
			        <img src="{{ photo.image.url }}" class="card-img-top">
                </div>
            </div> 
        {% endfor %}
    </div>
</div>
{% endblock %}
